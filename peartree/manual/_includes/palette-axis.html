{%- comment -%}
  palette-axis.html — Axis section preview
  Parameters:
    legend  (optional) — caption text
{%- endcomment -%}
{%- assign _legend = legend | default: "" -%}
<div class="pt-ui-demo pt-ui-demo--palette">
  <div class="pt-palette-section pt-palette-section--demo">
    <h3>
      <i class="bi bi-rulers bi-rotate-270"></i> Axis
      <span class="pt-sec-actions">
        <button class="pt-sec-pin" title="Pin open"><i class="bi bi-pin"></i></button>
        <i class="bi bi-chevron-right pt-sec-chevron"></i>
      </span>
    </h3>
    <div class="pt-section-body">
      <div class="pt-section-body-inner">
        <div class="pt-palette-row" title="Show a scale axis; choose direction or time-calibrated mode"><span class="pt-palette-label">Show</span><select class="pt-palette-select" disabled><option value="off">Off</option><option value="forward">Forward</option><option value="reverse">Reverse</option><option value="time">Time</option></select></div>
        <div class="pt-sub-controls pt-detail pt-detail-open">
          <div class="pt-palette-row" title="Axis lines and tick label colour"><span class="pt-palette-label">Colour <i class="bi bi-palette form-label-sm"></i></span><input type="color" class="pt-palette-color" value="#f2f1e6" disabled /></div>
          <div class="pt-palette-row" title="Font size of axis tick labels"><span class="pt-palette-label">Size <i class="bi bi-fonts form-label-sm"></i></span><input type="range" class="form-range" min="6" max="48" value="9" disabled /><span class="pt-val">9</span></div>
          <div class="pt-palette-row" title="Typeface for axis tick labels"><span class="pt-palette-label">Typeface <i class="bi bi-type form-label-sm"></i></span><select class="pt-palette-select" disabled><option value="">Theme</option></select></div>
          <div class="pt-palette-row" title="Font style for axis tick labels"><span class="pt-palette-label">Style <i class="bi bi-type-italic form-label-sm"></i></span><select class="pt-palette-select" disabled><option value="">Theme</option></select></div>
          <div class="pt-palette-row" title="Axis line width in screen pixels"><span class="pt-palette-label">Line <i class="bi bi-border-width form-label-sm"></i></span><input type="range" class="form-range" min="0.5" max="4" step="0.5" value="1" disabled /><span class="pt-val">1</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
{%- if _legend -%}<p class="pt-ui-demo-legend">{{ _legend }}</p>{%- endif -%}
