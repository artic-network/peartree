{%- comment -%}
  palette-tree.html — Tree section preview
  Parameters:
    legend  (optional) — caption text
{%- endcomment -%}
{%- assign _legend = legend | default: "" -%}
<div class="pt-ui-demo pt-ui-demo--palette">
  <div class="pt-palette-section pt-palette-section--demo">
    <h3>
      <i class="bi bi-tree"></i> Tree
      <span class="pt-sec-actions">
        <button class="pt-sec-pin" title="Pin open"><i class="bi bi-pin"></i></button>
        <i class="bi bi-chevron-right pt-sec-chevron"></i>
      </span>
    </h3>
    <div class="pt-section-body">
      <div class="pt-section-body-inner">
        <div class="pt-palette-row" title="Canvas background colour"><span class="pt-palette-label">Background <i class="bi bi-palette form-label-sm"></i></span><input type="color" class="pt-palette-color" value="#02292e" disabled /></div>
        <div class="pt-palette-row" title="Length of the root stem as a percentage of tree width"><span class="pt-palette-label">Root len <i class="bi bi-arrows form-label-sm"></i></span><input type="range" class="form-range" min="0" max="20" step="1" value="1" disabled /><span class="pt-val">1%</span></div>
      </div>
    </div>
  </div>
</div>
{%- if _legend -%}<p class="pt-ui-demo-legend">{{ _legend }}</p>{%- endif -%}
