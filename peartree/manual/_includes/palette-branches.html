{%- comment -%}
  palette-branches.html — Branches section preview
  Parameters:
    legend  (optional) — caption text
{%- endcomment -%}
{%- assign _legend = legend | default: "" -%}
<div class="pt-ui-demo pt-ui-demo--palette">
  <div class="pt-palette-section pt-palette-section--demo">
    <h3>
      <i class="bi bi-diagram-2-fill bi-rotate-270"></i> Branches
      <span class="pt-sec-actions">
        <button class="pt-sec-pin" title="Pin open"><i class="bi bi-pin"></i></button>
        <i class="bi bi-chevron-right pt-sec-chevron"></i>
      </span>
    </h3>
    <div class="pt-section-body">
      <div class="pt-section-body-inner">
        <div class="pt-palette-row" title="Branch line colour"><span class="pt-palette-label">Colour <i class="bi bi-palette form-label-sm"></i></span><input type="color" class="pt-palette-color" value="#f2f1e6" disabled /></div>
        <div class="pt-palette-row" title="Branch line thickness in screen pixels"><span class="pt-palette-label">Width <i class="bi bi-arrows-expand form-label-sm"></i></span><input type="range" class="form-range" min="0.5" max="8" step="0.5" value="1" disabled /><span class="pt-val">1</span></div>
        <div class="pt-palette-row" title="Rounded corner radius on branch elbows"><span class="pt-palette-label">Elbow Radius <i class="bi bi-radar form-label-sm"></i></span><input type="range" class="form-range" min="0" max="20" step="1" value="2" disabled /><span class="pt-val">2</span></div>
      </div>
    </div>
  </div>
</div>
{%- if _legend -%}<p class="pt-ui-demo-legend">{{ _legend }}</p>{%- endif -%}
